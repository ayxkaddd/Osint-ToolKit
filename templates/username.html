{% extends "base.html" %}

{% block title %}Username Search - OSINT Toolkit{% endblock %}

{% block content %}
<div class="username-page mx-auto w-full max-w-6xl px-4 py-6 md:px-6">
    <div class="username-toolbar">
        <div class="username-title">
            <h1>Username Search</h1>
            <span id="progressText">0 / 0</span>
        </div>

        <form id="searchForm" class="username-search-form" autocomplete="off">
            <input
                type="search"
                id="usernameSearchInput"
                name="osint-search-target"
                placeholder="Enter username"
                autocomplete="off"
                autocapitalize="none"
                autocorrect="off"
                spellcheck="false"
                aria-label="Username"
                required>
            <button type="submit" id="searchBtn">
                <i class="fas fa-search"></i>
                <span>Search</span>
            </button>
            <button type="button" id="stopBtn" class="hidden">
                <i class="fas fa-stop"></i>
            </button>
        </form>
    </div>

    <div class="username-status-row">
        <div class="username-stat">
            <span>Scanned</span>
            <strong id="sourcesScanned">0</strong>
        </div>
        <div class="username-stat">
            <span>Found</span>
            <strong id="usernamesFound">0</strong>
        </div>
        <div class="username-stat">
            <span>Accounts</span>
            <strong id="totalAccounts">0</strong>
        </div>
        <div class="username-stat">
            <span>Progress</span>
            <strong id="progressPercent">0%</strong>
        </div>
    </div>

    <div id="progressSection" class="username-progress hidden">
        <div id="progressBar" style="width: 0%"></div>
    </div>

    <div class="username-controls">
        <div id="currentlyChecking" class="username-current hidden">
            <span></span>
            <strong id="currentSite"></strong>
        </div>

        <div id="filterSection" class="username-view-controls hidden">
            <div class="username-segmented" aria-label="Result layout">
                <button type="button" id="flatViewBtn" class="active" data-view="flat">
                    <i class="fas fa-border-all"></i>
                    <span>Flat</span>
                </button>
                <button type="button" id="groupedViewBtn" data-view="grouped">
                    <i class="fas fa-layer-group"></i>
                    <span>Grouped</span>
                </button>
            </div>
            <select id="categoryFilter" class="hidden">
                <option value="all">All Categories</option>
            </select>
        </div>
    </div>

    <div id="categoryStats" class="username-category-summary hidden">
        <div id="categoryStatsGrid"></div>
    </div>

    <div id="resultsContainer" class="username-results-shell">
        <div id="resultsMasonry" class="username-masonry"></div>
        <div id="groupedResults" class="username-grouped hidden"></div>
    </div>
</div>

{% block extra_head %}
<link rel="stylesheet" href="/static/css/username.css">
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/username.js"></script>
{% endblock %}
{% endblock %}
